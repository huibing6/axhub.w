name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Sync vendor packages
        run: pnpm vendor:sync

      - name: Scan entries
        run: node scripts/scan-entries.js

      - name: Build
        run: pnpm build

      - name: Debug dist contents
        run: |
          echo "=== dist directory ==="
          ls -la dist/ 2>/dev/null || echo "dist not found"
          echo "=== dist subdirs ==="
          find dist/ -type f 2>/dev/null | head -50 || echo "no files"
          echo "=== admin template ==="
          ls -la admin/html-template.html 2>/dev/null || echo "template not found"

      - name: Create dist directory if not exists
        if: always()
        run: |
          if [ ! -d "dist" ]; then
            mkdir -p dist
            echo "Creating minimal dist structure"
          fi

      - name: Generate static HTML
        run: node scripts/generate-dist-html.js

      - name: Debug after generate
        run: |
          echo "=== dist after generate ==="
          find dist/ -name "*.html" 2>/dev/null | head -20 || echo "no html files"

      - name: Create root index.html
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>服务商管理系统 - 原型演示</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
              .container { max-width: 800px; width: 100%; padding: 40px 20px; }
              h1 { text-align: center; color: #1a1a1a; margin-bottom: 8px; font-size: 28px; }
              .subtitle { text-align: center; color: #666; margin-bottom: 40px; font-size: 14px; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
              .card { background: #fff; border-radius: 12px; padding: 24px; text-decoration: none; color: inherit; transition: all 0.2s; border: 1px solid #e8e8e8; }
              .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: #1677ff; }
              .card h3 { font-size: 16px; margin-bottom: 8px; color: #1a1a1a; }
              .card p { font-size: 13px; color: #888; line-height: 1.5; }
              .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; margin-bottom: 12px; }
              .badge-admin { background: #e6f4ff; color: #1677ff; }
              .badge-sp { background: #f6ffed; color: #52c41a; }
              .badge-portal { background: #fff7e6; color: #fa8c16; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>服务商管理系统</h1>
              <p class="subtitle">中国石油天然气集团有限公司服务采购管理办法（试行）原型演示</p>
              <div class="grid">
                <a href="prototypes/admin-workspace.html" class="card">
                  <span class="badge badge-admin">管理端</span>
                  <h3>管理工作台</h3>
                  <p>管理端主工作台，包含采购管理、合同管理、服务商管理等功能入口</p>
                </a>
                <a href="prototypes/sp-workspace.html" class="card">
                  <span class="badge badge-sp">服务商端</span>
                  <h3>服务商工作台</h3>
                  <p>服务商端主工作台，包含项目申报、合同管理、履约管理等功能</p>
                </a>
                <a href="prototypes/petroleum-portal.html" class="card">
                  <span class="badge badge-portal">门户</span>
                  <h3>石油门户</h3>
                  <p>统一门户入口，集成公告、通知、快捷入口等</p>
                </a>
                <a href="prototypes/site-inspection.html" class="card">
                  <span class="badge badge-admin">管理端</span>
                  <h3>现场检查</h3>
                  <p>QHSE现场检查管理，检查计划、执行、整改全流程</p>
                </a>
                <a href="prototypes/ref-app-home.html" class="card">
                  <span class="badge badge-portal">参考</span>
                  <h3>应用首页</h3>
                  <p>应用首页参考设计，展示系统整体布局</p>
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
